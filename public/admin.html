<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGENDIARIO — Painel Admin</title>
<link rel="icon" href="https://res.cloudinary.com/dlzrfhwin/image/upload/v1776770400/legendiario-icon-192_fxbguo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#FF4D14; --brand-dark:#C43B0F; --brand-soft:rgba(255,77,20,.12);
  --black:#0A0A0A; --ink:#111; --panel:#161616; --panel-2:#1E1E1E;
  --border:#262626; --border-2:#333;
  --text:#F5F5F5; --dim:#9A9A9A; --mute:#5A5A5A;
  --camo-olive:#4B5320; --camo-tan:#8B7E66; --camo-bark:#5C4033; --camo-dark:#333D26;
  --gold:#D4A017; --blood:#8B0000; --ok:#3E8F3E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:var(--text);line-height:1.5;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:14px;width:100%}
input:focus,textarea:focus,select:focus{outline:2px solid var(--brand);border-color:transparent}
textarea{min-height:90px;resize:vertical}
.f-serif{font-family:'Fraunces',Georgia,serif;font-style:italic}
#login-gate{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:14px}
#login-gate .card{background:var(--panel);border:1px solid var(--border);padding:32px;border-radius:10px;width:360px;display:flex;flex-direction:column;gap:14px;align-items:center}
#login-gate img{width:160px;margin-bottom:4px}
#login-gate h2{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);font-weight:700}
#login-gate .sub{font-size:12px;color:var(--mute);margin-top:-8px}
#login-gate input{text-align:center;letter-spacing:2px}
#login-gate .btn{width:100%;padding:13px;background:var(--brand);color:#fff;font-weight:800;letter-spacing:1px;border-radius:6px;text-transform:uppercase;font-size:13px}
#login-gate .err{color:#ff7b7b;font-size:12px;min-height:14px}
#login-gate label.chk{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);cursor:pointer;align-self:flex-start}
#login-gate label.chk input{width:auto}
.topbar{display:none;align-items:center;justify-content:space-between;padding:10px 20px;background:#050505;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.topbar .env{background:var(--brand);color:#fff;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.topbar .demo-tag{background:var(--gold);color:#000;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.shell{display:none;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#0D0D0D;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:4px 18px 18px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .brand .logo{width:40px;height:40px;background:var(--brand);border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:20px;letter-spacing:-1px}
.sidebar .brand .name{font-weight:800;font-size:15px;letter-spacing:.5px}
.sidebar .brand .role{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.nav-section{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);padding:14px 20px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;font-size:13px;color:var(--dim);text-align:left;border-left:3px solid transparent;font-weight:500;transition:all .15s;position:relative}
.nav-item:hover{color:var(--text);background:#141414}
.nav-item.active{color:var(--brand);border-left-color:var(--brand);background:#141414;font-weight:700}
.nav-item .icon{width:18px;text-align:center;font-weight:900;font-size:13px}
.nav-item .badge{position:absolute;right:16px;background:var(--blood);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px}
.sidebar .user-card{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--camo-olive));display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.user-card .name{font-size:13px;font-weight:700}
.user-card .sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}
.content{padding:26px 34px 60px;overflow-x:hidden}
.page-head{display:flex;align-items:baseline;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.page-head .t{font-size:15px;font-weight:800}
.page-head .ts{font-size:12px;color:var(--dim)}
.page-head .right{margin-left:auto;display:flex;gap:10px}
.page-head .right button{width:34px;height:34px;border-radius:6px;background:var(--panel);display:grid;place-items:center;font-size:14px;color:var(--dim);border:1px solid var(--border)}
.tab-view{display:none;padding-top:22px}
.tab-view.active{display:block;animation:fade .18s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.h1{font-weight:900;font-size:26px;letter-spacing:-.5px;margin-bottom:4px}
.subtitle{color:var(--dim);font-size:13px;margin-bottom:22px}
.subtabs{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:18px;padding:4px}
.subtabs.four{grid-template-columns:repeat(4,1fr)}
.subtab{padding:10px;font-size:13px;font-weight:600;color:var(--dim);border-radius:6px;text-align:center}
.subtab.active{background:var(--brand);color:#fff;font-weight:800}
.kpi-grid{display:grid;gap:12px;margin-bottom:18px}
.kpi-grid.c4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.c5{grid-template-columns:repeat(5,1fr)}
.kpi-grid.c6{grid-template-columns:repeat(6,1fr)}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--brand)}
.kpi.c-green::before{background:var(--ok)} .kpi.c-red::before{background:var(--blood)}
.kpi.c-gold::before{background:var(--gold)} .kpi.c-tan::before{background:var(--camo-tan)}
.kpi.c-olive::before{background:var(--camo-olive)} .kpi.c-blood::before{background:var(--blood)}
.kpi .label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:700;display:flex;justify-content:space-between;align-items:center}
.kpi .label .info{width:14px;height:14px;border-radius:50%;background:var(--panel-2);display:grid;place-items:center;color:var(--mute);font-size:9px;cursor:help;border:1px solid var(--border)}
.kpi .value{font-size:24px;font-weight:900;margin-top:8px;letter-spacing:-.5px;line-height:1.1}
.kpi .trend{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px;color:var(--ok);font-weight:600}
.kpi .trend.down{color:#ff7b7b}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.panel h3{font-size:13px;font-weight:800;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.panel h3 .tag{font-size:10px;font-weight:700;background:var(--ok);color:#fff;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.chart{height:240px;background:var(--panel-2);border-radius:8px;display:flex;align-items:flex-end;padding:14px;gap:6px;position:relative;overflow:hidden}
.chart .bar{flex:1;background:linear-gradient(180deg,var(--brand),var(--brand-dark));border-radius:3px 3px 0 0;position:relative;min-height:4%}
.chart.camo .bar{background:linear-gradient(180deg,var(--camo-olive),var(--camo-dark))}
.chart.gold .bar{background:linear-gradient(180deg,var(--gold),#8B6914)}
.donut{width:160px;height:160px;border-radius:50%;background:conic-gradient(var(--brand) 0deg 240deg,var(--camo-olive) 240deg 310deg,var(--camo-tan) 310deg 360deg);position:relative;margin:0 auto}
.donut::after{content:'';position:absolute;inset:28px;background:var(--panel);border-radius:50%}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:12px 8px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0f0f0f}
.u-cell{display:flex;align-items:center;gap:10px}
.u-cell .sub{font-size:11px;color:var(--dim)}
.pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.pill.ok{background:rgba(62,143,62,.15);color:#6bc96b}
.pill.dim{background:#222;color:var(--dim)}
.pill.warn{background:rgba(212,160,23,.15);color:var(--gold)}
.pill.danger{background:rgba(139,0,0,.2);color:#ff7b7b}
.pill.brand{background:var(--brand-soft);color:var(--brand)}
.streak-n{color:var(--brand);font-weight:800}
.filter-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.filter-row .pill-btn{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:700;background:var(--panel);border:1px solid var(--border);color:var(--dim)}
.filter-row .pill-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.filter-row input,.filter-row select{max-width:240px}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ach{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative}
.ach.active{border-left:3px solid var(--brand)}
.ach.locked{opacity:.42}
.ach .name{font-weight:800;font-size:14px;margin-bottom:2px}
.ach .hashtag{font-size:11px;color:var(--brand);font-weight:700}
.ach .count{position:absolute;right:16px;top:14px;font-size:24px;font-weight:900;letter-spacing:-1px}
.ach .pct{font-size:10px;color:var(--dim);position:absolute;right:16px;bottom:20px;font-weight:700}
.ach .bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.ach .bar span{display:block;height:100%;background:var(--brand);border-radius:2px}
.btn{padding:9px 16px;border-radius:6px;font-weight:700;font-size:13px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#2a2a2a}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:var(--brand-dark)}
.btn.danger{background:var(--blood);color:#fff;border-color:var(--blood)}
.btn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:11px}
.btn.xs{padding:4px 8px;font-size:10px}
.action-ico{width:30px;height:30px;border-radius:6px;background:var(--panel-2);display:inline-grid;place-items:center;font-size:12px;color:var(--dim);border:1px solid var(--border);margin-right:4px}
.action-ico:hover{background:#2a2a2a;color:var(--text)}
.action-ico.danger:hover{background:var(--blood);color:#fff;border-color:var(--blood)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);font-weight:700;display:block;margin-bottom:6px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px;width:540px;max-width:92vw;max-height:86vh;overflow-y:auto}
.modal h3{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .sub{font-size:12px;color:var(--dim);margin-bottom:18px}
.modal-close{float:right;font-size:18px;color:var(--dim);margin-top:-10px;margin-right:-6px;background:none;border:none;cursor:pointer}
#toast{position:fixed;bottom:26px;right:26px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--brand);padding:12px 18px;border-radius:6px;font-size:13px;font-weight:600;z-index:200;display:none;box-shadow:0 10px 40px rgba(0,0,0,.5)}
#toast.err{border-left-color:#ff7b7b}
#toast.ok{border-left-color:var(--ok)}
#toast.on{display:block;animation:slide .25s}
@keyframes slide{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.livro-grid{display:grid;grid-template-columns:200px 1fr;gap:14px;min-height:520px}
.livro-list{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;overflow-y:auto;max-height:600px}
.livro-list .day{padding:9px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;font-weight:600}
.livro-list .day:hover{background:var(--panel-2);color:var(--text)}
.livro-list .day.active{background:var(--brand);color:#fff;font-weight:800}
.livro-editor{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:12px}
.livro-editor .empty{margin:auto;color:var(--mute);font-size:13px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
.txt-dim{color:var(--dim)}.txt-mute{color:var(--mute)}
.row{display:flex;gap:10px;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center}
.ta-right{text-align:right}
.mt-12{margin-top:12px}.mb-12{margin-bottom:12px}.mb-20{margin-bottom:20px}
.no-data{color:var(--mute);text-align:center;padding:40px 20px;font-size:13px}
.health-card{background:var(--panel-2);border:1px solid var(--border);padding:14px;border-radius:8px;font-size:12px;color:var(--dim);line-height:1.6}
.health-card b{color:var(--text)}
</style>
</head>
<body>

<div id="login-gate">
  <div class="card">
    <h2>Legendiario Admin</h2>
    <div class="sub">Acesso restrito à equipe</div>
    <div class="field" style="width:100%">
      <label>Chave de Administrador</label>
      <input type="password" id="admin-key-input" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <label class="chk"><input type="checkbox" id="remember-key" checked> Guardar este dispositivo</label>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div class="topbar" id="topbar">
  <div class="row">
    <span class="env">Staging</span>
    <span class="demo-tag" id="demo-tag">MODO DEMO — dados fictícios</span>
  </div>
  <div class="row">
    <button class="btn xs ghost" onclick="toggleDemo()" id="demo-toggle">Alternar para dados reais</button>
    <button class="btn xs ghost" onclick="doLogout()">Sair</button>
  </div>
</div>

<div class="shell" id="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">L</div>
      <div>
        <div class="name">Legendiario</div>
        <div class="role">Painel Admin</div>
      </div>
    </div>
    <div class="nav-section">Principal</div>
    <button class="nav-item active" data-tab="visao"><span class="icon">◉</span> Visão Geral</button>
    <button class="nav-item" data-tab="engaj"><span class="icon">↗</span> Engajamento</button>
    <button class="nav-item" data-tab="conteudo"><span class="icon">✎</span> Conteúdo</button>
    <button class="nav-item" data-tab="autores"><span class="icon">✦</span> Autores</button>
    <div class="nav-section">Gestão</div>
    <button class="nav-item" data-tab="users"><span class="icon">◈</span> Usuários</button>
    <button class="nav-item" data-tab="whatsapp"><span class="icon">⌬</span> WhatsApp <span class="badge">3</span></button>
    <div class="nav-section">Analytics</div>
    <button class="nav-item" data-tab="demo"><span class="icon">⚇</span> Demografia</button>
    <button class="nav-item" data-tab="financeiro"><span class="icon">$</span> Financeiro</button>
    <div class="nav-section">Estratégico</div>
    <button class="nav-item" data-tab="hooked"><span class="icon">◇</span> Modelo Hooked</button>
    <button class="nav-item" data-tab="investidor"><span class="icon">▲</span> Investidor</button>
    <div class="user-card">
      <div class="avatar">BF</div>
      <div>
        <div class="name">Brunno Falcão</div>
        <div class="sub">Administrador</div>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="page-head">
      <span class="t" id="page-title">Visão Geral</span>
      <span class="ts">Última atualização: agora</span>
      <div class="right">
        <button title="Notificações">🔔</button>
        <button title="Exportar">⤓</button>
        <button title="Configurações">⚙</button>
      </div>
    </div>
    <div id="tabs-root"></div>
  </main>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-inner"></div></div>
<div id="toast"></div>

<script src="admin-data.js"></script>
<script src="admin-views.js"></script>
<script src="admin-core.js"></script>
</body>
</html>
